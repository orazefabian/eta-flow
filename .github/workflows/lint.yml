name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: ESLint, Prettier & Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify committed bundle is up to date
        run: |
          if ! git diff --quiet -- dist/eta-flow-card.js; then
            echo "::error::dist/eta-flow-card.js is stale. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist/eta-flow-card.js
            exit 1
          fi
